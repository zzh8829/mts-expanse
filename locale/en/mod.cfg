[mod-setting-description]
mts-expanse-cell-size=Width and height of each Expanse unlock cell. Startup-only because existing surfaces are laid out on this grid.
mts-expanse-token-chance=Coins dropped when a hungry chest is completed. Fractional values are a probability; whole values always drop that many coins.
mts-expanse-price-distance-modifier=Multiplier used when calculating hungry chest request costs from distance.
mts-expanse-max-ore-price-modifier=Maximum resource amount multiplier used when pricing ore and oil inside a cell.
mts-expanse-override-nauvis=Use a private source surface for Expanse terrain generation. In MTS games each team uses its own source surface.
mts-expanse-cleanup-mts-nauvis=After a team is moved onto Expanse, delete the unused MTS starter Nauvis surface for that team.
mts-expanse-admin-open-max-radius=Maximum radius accepted by /expanse-open and /expanse-open-at.
mts-expanse-admin-frontier-max-rings=Maximum ring count accepted by /expanse-open-frontier.
mts-expanse-admin-frontier-max-cells=Maximum number of cells /expanse-open-frontier can open per run.
mts-expanse-cell-value-multiplier=Base multiplier applied to cell area before distance and resource pricing are added.
mts-expanse-min-cell-value=Minimum budget for a hungry chest request.
mts-expanse-fluid-price-multiplier=Multiplier used when pricing fluid resources inside a cell.
mts-expanse-ore-modifier-divisor=Divisor used to derive the resource price modifier from distance.
mts-expanse-tier-distance-thresholds=Comma-separated tier distance thresholds. Six positive values are required; invalid values fall back to the default.
mts-expanse-price-roll-count=How many times a hungry chest rolls request stacks from its budget.
mts-expanse-tier10-special-chance=One-in-N chance for a tier 10 cell to place the final special instead of a random space-age biome.
mts-expanse-sync-cell-content=When enabled, hungry chest item, quality, and count rolls are deterministic by cell so matching team maps require the same contents.
mts-expanse-map-starting-area=Starting area value applied to the source terrain surface before regeneration.
mts-expanse-spoil-time-modifier=Global spoil time modifier applied during Expanse initialization and setting changes.
mts-expanse-enemy-expansion-cooldown-ticks=Tick cooldown for enemy expansion min and max values.
mts-expanse-enemy-settler-group-max-size=Enemy expansion settler_group_max_size map setting.
mts-expanse-enemy-settler-group-min-size=Enemy expansion settler_group_min_size map setting.
mts-expanse-enemy-evolution-destroy-factor=Enemy evolution destroy factor map setting.
mts-expanse-enemy-evolution-pollution-factor=Enemy evolution pollution factor map setting.
mts-expanse-enemy-evolution-time-factor=Enemy evolution time factor map setting.
mts-expanse-map-reset-delay-ticks=Ticks to wait after Expanse victory before rebuilding that team's Expanse.
mts-expanse-space-production-interval-ticks=Ticks between space mission production and delivery processing.
mts-expanse-invasion-enabled=When disabled, pending invasion candidate markers are cleared and no invasion waves are scheduled.
mts-expanse-sync-invasions=When enabled, invasion candidate rolls, candidate ordering, wave counts, and biter/worm/nest spawn rolls are deterministic by cell across teams.
mts-expanse-spawner-spawn-base=Base number of units spawned when an Expanse spawner is cloned.
mts-expanse-spawner-spawn-evolution-scale=Additional spawner units based on enemy evolution.
mts-expanse-invasion-candidate-base=Base number of marked candidate cells needed before an invasion starts.
mts-expanse-invasion-candidate-evolution-scale=Additional candidate cells required based on enemy evolution.
mts-expanse-invasion-group-base=Base number of simultaneous invasion groups.
mts-expanse-invasion-group-evolution-scale=Additional invasion groups based on enemy evolution.
mts-expanse-invasion-detonate-delay-ticks=Ticks from scheduling until invasion detonation.
mts-expanse-invasion-first-warning-delay-ticks=Ticks after scheduling before the first invasion warning.
mts-expanse-invasion-extra-warning-1-ticks=Additional warning offset before detonation.
mts-expanse-invasion-extra-warning-2-ticks=Additional warning offset before detonation.
mts-expanse-invasion-nuke-kill-radius=Radius of entities killed outright by the invasion strike.
mts-expanse-invasion-nuke-damage-radius=Radius of entities damaged by the invasion strike.
mts-expanse-invasion-nuke-damage-fraction=Fraction of max health dealt to entities in the damage radius.
mts-expanse-invasion-biter-base=Base number of biters in each invasion wave.
mts-expanse-invasion-biter-evolution-scale=Additional wave biters based on enemy evolution.
mts-expanse-invasion-biter-round-scale=Additional wave biters per invasion round.
mts-expanse-invasion-worm-base=Base number of worms in each invasion wave.
mts-expanse-invasion-worm-evolution-scale=Additional wave worms based on enemy evolution.
mts-expanse-invasion-rounds-base=Base number of waves per invasion group.
mts-expanse-invasion-rounds-random-max=Adds a random 1..N wave count. Set to 0 for no random extra waves.
mts-expanse-invasion-wave-first-delay-ticks=Delay after detonation before the first spawned wave.
mts-expanse-invasion-wave-interval-ticks=Ticks between spawned invasion waves.
mts-expanse-invasion-attack-radius=Attack area radius assigned to invasion unit groups.
mts-expanse-invasion-render-grace-ticks=Extra marker lifetime after detonation and scheduled waves.
mts-expanse-use-space-platform=Advanced Space Age mode: use an actual orbit platform for missions. Disabled by default to avoid the orbit platform helper.
mts-expanse-nonspace-support-size=Width and height for the hidden support surface used by Space Age mission cargo when orbit platform mode is disabled.
mts-expanse-rocket-launch-weight-threshold=Minimum rocket cargo weight before Expanse mission silos auto-launch to the support hub.
