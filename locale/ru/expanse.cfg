map_info_main_caption=-- Э к с п а н с и я --
map_info_text=Синие сундуки голодны.\nНакормите их, и они вознаградят вас дополнительными землями.\n\nДружелюбное дерево инфини предоставит вам всю древесину, которую вы когда-либо хотели.\nВечный камень с радостью предоставит вам ресурсы.\n\nЕсли вы застряли, положите жетон изменения, МОНЕТУ, в сундук, чтобы получить новое предложение.\nОткрытие сундуков может привести к выпадению дополнительных жетонов.\nКусаки могут вторгнуться на ваши земли, нам удалось отметить опасные места, но кусаки могут выбрать некоторые из них случайным образом.\nИсследования добычи теперь увеличивают размер инвентаря.\nБочка с кислотой позволяет добыть немного урана из породы, если у вас есть исследование урана.
